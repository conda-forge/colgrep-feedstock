context:
  version: "1.5.4"

package:
  name: colgrep
  version: ${{ version }}

source:
  url: https://github.com/lightonai/next-plaid/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 3206ac74d20abb930c37b4c24a8926a538bcb328118424e9209a262a974294b1

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - if: linux
        then:
          - export CFLAGS="${CFLAGS} -D_GNU_SOURCE"
      - if: unix
        then:
          - cargo auditable install --locked --no-track --bins --root ${{ PREFIX }} --path colgrep
        else:
          - cargo auditable install --locked --no-track --bins --root %LIBRARY_PREFIX% --path colgrep
      - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - cargo-auditable
    - if: unix
      then:
        - pkg-config
  host:
    - openssl

tests:
  - script: colgrep --help
  - package_contents:
      bin:
        - colgrep
      strict: true

about:
  homepage: https://github.com/lightonai/next-plaid
  summary: Semantic code search powered by ColBERT multi-vector embeddings
  description: |
    ColGREP is a terminal-based semantic code search tool that combines regex
    filtering with semantic ranking using ColBERT-style multi-vector embeddings.
    It uses Tree-sitter to parse code into structured units and ONNX Runtime for
    local model inference. All processing happens locally — code never leaves
    your machine.
  license: Apache-2.0
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  repository: https://github.com/lightonai/next-plaid

extra:
  recipe-maintainers:
    - moritzwilksch
